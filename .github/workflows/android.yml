name: APK bauen

# Läuft bei jedem Push auf main, bei jedem Tag (v1.0.0 usw.)
# und jederzeit von Hand über den Reiter "Actions" → "APK bauen" → "Run workflow".
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  apk:
    runs-on: ubuntu-latest

    steps:
      - name: Quellcode holen
        uses: actions/checkout@v4

      - name: Node einrichten
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Java einrichten
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Pakete installieren
        run: npm install

      - name: Web-App bauen (www/)
        run: npm run build

      - name: Android-Projekt erzeugen
        run: npx cap add android

      - name: App-Icons und Startbildschirm erzeugen
        run: npx capacitor-assets generate --android

      - name: Web-App ins Android-Projekt übernehmen
        run: npx cap sync android

      - name: APK bauen
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: APK umbenennen
        run: |
          mkdir -p out
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             out/Sportnoten-${{ github.run_number }}.apk

      - name: APK zum Herunterladen bereitstellen
        uses: actions/upload-artifact@v4
        with:
          name: Sportnoten-APK
          path: out/*.apk
          retention-days: 30

      # Bei einem Tag wie v1.0.0 wird zusätzlich eine Release-Seite mit der APK angelegt
      - name: Release veröffentlichen
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" out/*.apk \
            --title "Sportnoten ${GITHUB_REF_NAME}" \
            --notes "Automatisch gebaute Testversion. Zum Installieren auf dem Android-Gerät die APK herunterladen und die Installation aus unbekannter Quelle erlauben."
