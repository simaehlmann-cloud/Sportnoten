<style>
:root{
  --bg:#EFF3F1; --card:#fff; --ink:#152A22; --sub:#556B62; --faint:#85988F;
  --line:#E8EEEB; --border:#D2DCD7; --accent:#0E7C5A; --accent-soft:#E4F3EC;
  --yellow:#FFD84D; --red:#B0392E; --red-soft:#FBE9E7; --green:#1E7B3C; --green-soft:#E4F5E9;
  --warn:#A97400; --warn-soft:#FFF6E0; --hero1:#12312A; --hero2:#1C4C3D; --hero-ink:#A8C6BA; --chip:#F0F4F2;
  --note-bg:#FFFDF4; --shadow:0 1px 4px rgba(21,42,34,.09);
  --disp:'Space Grotesk',ui-rounded,'Avenir Next','Segoe UI',system-ui,sans-serif;
  --body:'Karla',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
}
[data-theme="dark"]{
  --bg:#0F1714; --card:#18231F; --ink:#E7EFEA; --sub:#A2B5AC; --faint:#788C83;
  --line:#25332D; --border:#38493F; --accent:#57C79B; --accent-soft:#1D3830;
  --yellow:#FFD84D; --red:#F09489; --red-soft:#3F2926; --green:#6FD694; --green-soft:#20372A;
  --warn:#FFD84D; --warn-soft:#3A3020; --hero1:#0B1512; --hero2:#173028; --hero-ink:#93AFA4; --chip:#22302A;
  --note-bg:#222E29; --shadow:0 1px 4px rgba(0,0,0,.4);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:var(--body);min-height:100vh}
input,textarea,select,button{font-family:var(--body);color:var(--ink)}
input:focus,textarea:focus,select:focus,button:focus-visible{outline:2px solid var(--accent);outline-offset:1px}
.wrap{max-width:920px;margin:0 auto;padding:0 14px 90px}
[data-wide="1"] .wrap{max-width:1500px}
.card{background:var(--card);border-radius:16px;padding:14px;box-shadow:var(--shadow);margin-bottom:12px}
h2.sec{font-family:var(--disp);font-size:14px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;margin:0 0 10px;display:flex;align-items:center;gap:6px}
.brand{font-family:var(--disp);font-weight:700}
.btn{background:var(--accent);color:#fff;border:none;border-radius:11px;padding:9px 16px;font-size:15px;font-weight:700;font-family:var(--disp);cursor:pointer}
[data-theme="dark"] .btn{color:#0B1512}
.btn-ghost{background:var(--card);color:var(--accent);border:1.5px solid var(--accent);border-radius:11px;padding:7px 13px;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--disp)}
.btn-quiet{background:var(--card);color:var(--sub);border:1.5px solid var(--border);border-radius:11px;padding:7px 13px;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--disp)}
.btn-danger{background:var(--card);color:var(--red);border:1.5px solid var(--red);border-radius:11px;padding:7px 13px;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--disp)}
.inp{width:100%;padding:10px 11px;border-radius:11px;border:1.5px solid var(--border);font-size:16px;background:var(--card)}
.ta{width:100%;min-height:80px;padding:10px 11px;border-radius:11px;border:1.5px solid var(--border);font-size:15px;background:var(--note-bg);resize:vertical;line-height:1.5}
.cell{width:100%;min-height:44px;padding:10px 5px;text-align:center;border-radius:9px;border:1.5px solid var(--border);font-size:16px;font-weight:700;font-family:var(--disp);background:var(--card)}
.cell.bad{border-color:var(--red);background:var(--red-soft);color:var(--red)}
.cell:focus{border-color:var(--accent)}
.row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.hint{font-size:13px;color:var(--sub);line-height:1.5}
.lbl{font-size:12px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.04em}
.xbtn{background:none;border:none;color:var(--red);font-size:17px;cursor:pointer;padding:2px 6px;line-height:1}
.pill{border-radius:20px;padding:3px 10px;font-size:12px;font-weight:700;background:var(--chip);color:var(--sub);white-space:nowrap}
.warnbox{background:var(--warn-soft);border-radius:11px;padding:10px 12px;font-size:13px;line-height:1.5;color:var(--ink)}
.ico{vertical-align:-3px;flex-shrink:0}
.scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
table.grid{border-collapse:separate;border-spacing:0;font-size:14px;min-width:100%}
table.grid th,table.grid td{padding:6px 7px;border-bottom:1px solid var(--line);white-space:nowrap}
table.grid th{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--faint);text-align:center;font-weight:700}
table.grid th.l,table.grid td.l{text-align:left}
table.grid tbody tr:nth-child(even){background:var(--chip)}
table.grid td.stick,table.grid th.stick{position:sticky;left:0;background:var(--card);z-index:1;box-shadow:1px 0 0 var(--line)}
table.grid tbody tr:nth-child(even) td.stick{background:var(--chip)}
table.grid tbody tr:focus-within{box-shadow:inset 3px 0 0 var(--accent)}
table.grid tbody tr:focus-within td{background:var(--accent-soft)}
[data-hall="1"] table.grid td,[data-hall="1"] table.grid th{padding:11px 9px;font-size:16px}
[data-hall="1"] .cell{padding:14px 5px;font-size:20px;min-height:54px}
[data-hall="1"] .att{width:46px;padding:11px 0;font-size:15px}
[data-hall="1"] .tab{padding:10px 16px;font-size:15px}
[data-hall="1"] .btn,[data-hall="1"] .btn-ghost,[data-hall="1"] .btn-quiet{padding:12px 18px;font-size:16px}
.bar{height:7px;background:var(--chip);border-radius:4px;overflow:hidden}
.bar>div{height:7px;background:var(--accent);border-radius:4px}
.nchip{display:inline-flex;align-items:center;gap:5px;border:1.5px solid;border-radius:9px;padding:2px 7px;font-family:var(--disp);font-weight:700;font-size:14px;background:var(--card)}
.segs{display:inline-flex;gap:1.5px;align-items:flex-end;height:11px}
.segs i{width:3px;border-radius:1px;display:block}
.att{border:none;border-radius:9px;min-height:40px;padding:8px 0;width:40px;font-weight:700;font-size:14px;cursor:pointer;font-family:var(--disp)}
.switch{position:relative;width:44px;height:25px;flex-shrink:0}
.switch input{opacity:0;width:0;height:0}
.slider{position:absolute;inset:0;background:var(--border);border-radius:20px;cursor:pointer;transition:.2s}
.slider:before{content:"";position:absolute;height:19px;width:19px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
.switch input:checked + .slider{background:var(--accent)}
.switch input:checked + .slider:before{transform:translateX(19px)}
.tabbar{display:flex;gap:6px;overflow-x:auto;padding:2px 0 8px}
.tab{border:1.5px solid var(--border);background:var(--card);color:var(--sub);border-radius:20px;padding:6px 13px;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:var(--disp)}
.tab.on{border-color:var(--accent);background:var(--accent);color:#fff}
[data-theme="dark"] .tab.on{color:#0B1512}
.snack{position:fixed;left:50%;transform:translateX(-50%);bottom:16px;z-index:120;background:var(--hero1);color:#fff;border-radius:13px;padding:10px 16px;display:flex;gap:14px;align-items:center;box-shadow:0 4px 16px rgba(0,0,0,.35);font-size:14px;font-weight:600;max-width:92vw}
.snack button{background:none;border:none;color:var(--yellow);font-weight:700;cursor:pointer;font-size:14px}
.watchbar{position:sticky;top:0;z-index:20;background:var(--hero1);color:#fff;border-radius:14px;padding:10px 12px;margin-bottom:12px;box-shadow:var(--shadow)}
.lock{min-height:100vh;display:flex;align-items:center;justify-content:center}
.todoflag{border:none;background:none;cursor:pointer;font-size:17px;padding:9px 8px;line-height:1;min-height:44px}

.print-sheet{display:none}
@media print{
  body{background:#fff}
  #app{display:none}
  .print-sheet{display:block;color:#000;padding:18px;font-size:11px}
  .print-sheet h1{font-family:var(--disp);margin:0 0 4px;font-size:17px}
  .print-sheet table{width:100%;border-collapse:collapse;margin-top:10px}
  .print-sheet td,.print-sheet th{border:1px solid #bbb;padding:4px;text-align:center}
  .print-sheet th:first-child,.print-sheet td:first-child{text-align:left}

========================================================= */
const APP_NAME="Sportnoten", APP_SUB="Notenverwaltung", APP_VER="3.2.0", DEVELOPER="Simon Mählmann";

const uid=()=>Math.random().toString(36).slice(2,10);
const today=()=>new Date().toISOString().slice(0,10);
const deDate=(iso)=>iso?iso.slice(8,10)+"."+iso.slice(5,7)+"."+iso.slice(0,4):"";
const daysSince=(iso)=>iso?Math.floor((Date.now()-new Date(iso).getTime())/86400000):null;
let SAFE_COLORS=false;

/* ---------- Speicher ---------- */
const store={
  async get(k){
    try{ if(window.storage){const r=await window.storage.get(k); return r?JSON.parse(r.value):null;} }catch(e){}
    try{ const v=localStorage.getItem(k); return v?JSON.parse(v):null; }catch(e){}
    return null;
  },
  async set(k,v){
    try{ if(window.storage){await window.storage.set(k,JSON.stringify(v)); return;} }catch(e){}
    try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){}
  }
};

/* ---------- Krypto ---------- */
const b64=(buf)=>btoa(String.fromCharCode(...new Uint8Array(buf)));
const unb64=(s)=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
const hasCrypto=()=>!!(window.crypto&&window.crypto.subtle);
async function sha256(txt){
  if(!hasCrypto()) return "plain:"+txt;
  const h=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(txt));
  return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,"0")).join("");
}
async function deriveKey(pass,salt,use){
  const km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pass),"PBKDF2",false,["deriveKey"]);
  return crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:200000,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,use);
}
async function encryptJson(obj,pass){
  const salt=crypto.getRandomValues(new Uint8Array(16)), iv=crypto.getRandomValues(new Uint8Array(12));
  const key=await deriveKey(pass,salt,["encrypt"]);
  const ct=await crypto.subtle.encrypt({name:"AES-GCM",iv},key,new TextEncoder().encode(JSON.stringify(obj)));
  return {sportnoten:"encrypted",v:1,salt:b64(salt),iv:b64(iv),data:b64(ct)};
}
async function decryptJson(pkg,pass){
  const key=await deriveKey(pass,unb64(pkg.salt),["decrypt"]);
  const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:unb64(pkg.iv)},key,unb64(pkg.data));
  return JSON.parse(new TextDecoder().decode(pt));
}

/* ---------- Icons ---------- */
const P={

const Ic=({n,size=16,color,style})=>(
  <svg className="ico" width={size} height={size} viewBox="0 0 24 24" fill="none"
    stroke={color||"currentColor"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={style}>{P[n]}</svg>);

/* ---------- Noten ---------- */
const parseNote=(s)=>{
  if(s===""||s==null) return null;
  const str=String(s).trim().replace(",",".");
  const m=str.match(/^(\d(?:\.\d+)?)\s*([+\-−])$/);
  if(m){const b=parseFloat(m[1]); return Math.round((m[2]==="+"?b-0.3:b+0.3)*10)/10;}
  const n=parseFloat(str); return isNaN(n)?null:n;
};
/* Rundung ohne Fließkomma-Überraschungen: 1,005 → 1,01 statt 1,00 */
const round=(v,d=2)=>{ if(v==null||isNaN(v)) return v;
  const p=Math.pow(10,d); return Math.round(Number((v*p).toPrecision(15)))/p; };
const fmtNote=(n,d=2)=>{ if(n==null||isNaN(n)) return "–";
  const r=round(n,d); return r.toFixed(r%1===0?0:d).replace(".",","); };
/* Nur Noten von 1 bis 6 (inkl. Tendenz 0,7er-Schritte) gehen in die Berechnung ein */
const NOTE_MIN=1, NOTE_MAX=6;
const noteOf=(s)=>{ const n=parseNote(s); return (n!=null&&n>=NOTE_MIN&&n<=NOTE_MAX)?n:null; };
const noteBad=(s)=>{ if(s===""||s==null) return false; const n=parseNote(s); return n==null||n<NOTE_MIN||n>NOTE_MAX; };
const PTS=[[1.0,15],[1.3,14],[1.5,13],[1.7,13],[2.0,11],[2.3,10],[2.5,9],[2.7,9],[3.0,8],[3.3,7],[3.5,6],[3.7,6],[4.0,5],[4.3,4],[4.7,3],[5.0,2],[5.3,2],[5.7,1],[6.0,0]];
const toPoints=(n)=>{if(n==null)return "–"; let b=PTS[0]; for(const p of PTS) if(Math.abs(p[0]-n)<Math.abs(b[0]-n)) b=p; return b[1];};
const isDark=()=>document.documentElement.getAttribute("data-theme")==="dark";
const noteColor=(n)=>{
  if(n==null||isNaN(n)) return "var(--faint)";
  const p=Math.max(0,Math.min(1,(6-n)/5));
  const h=SAFE_COLORS?Math.round(28+p*192):Math.round(p*122);      /* sicher: Orange → Blau */
  const sat=SAFE_COLORS?68:60;
  return `hsl(${h},${sat}%,${isDark()?62:40}%)`;
};
const mean=(a)=>{const v=a.filter(x=>x!=null&&!isNaN(x)); return v.length?v.reduce((x,y)=>x+y,0)/v.length:null;};
const wMean=(pairs)=>{let s=0,w=0; for(const [v,g] of pairs) if(v!=null&&!isNaN(v)&&g>0){s+=v*g;w+=g;} return w?s/w:null;};

/* ---------- Messwerte ---------- */
const UNITS=[["m","Meter"],["cm","Zentimeter"],["s","Sekunden"],["min","Minuten (mm:ss)"],["n","Anzahl / Wdh."],["p","Punkte"]];
const GRADE_STEPS=[1,2,3,4,5,6];
const parseVal=(s,unit)=>{
  if(s===""||s==null) return null;
  const str=String(s).trim().replace(",",".");
  if(unit==="min"){const m=str.match(/^(\d+):(\d+(?:\.\d+)?)$/); if(m) return parseInt(m[1],10)*60+parseFloat(m[2]);}
  const n=parseFloat(str); return isNaN(n)?null:n;
};
const fmtVal=(v,unit)=>{
  if(v==null||isNaN(v)) return "";
  if(unit==="min"){const m=Math.floor(v/60),s=v-m*60; return m+":"+(s<10?"0":"")+String(Number(s.toFixed(2))).replace(".",",");}
  return String(Number(v.toFixed(2))).replace(".",",");
};
function gradeFromTable(tab,val,jg,gender){
  if(!tab||val==null) return null;
  const rows=tab.rows.filter(r=>String(r.jg)===String(jg)&&(r.gender===gender||r.gender==="x"));
  const row=rows.find(r=>r.gender===gender)||rows[0];
  if(!row) return null;
  const th=GRADE_STEPS.map(g=>({g,v:parseVal(row.vals[g],tab.unit)})).filter(x=>x.v!=null);
  if(!th.length) return null;
  const ok=tab.better==="low"?(a,b)=>a<=b:(a,b)=>a>=b;
  let note=null;
  for(const x of th){ if(ok(val,x.v)){note=x.g;break;} }
  if(note==null) note=6;
  if(!tab.interpolate) return note;
  const i=th.findIndex(x=>x.g===note);
  if(i<=0) return note;
  const span=Math.abs(th[i-1].v-th[i].v)||1;
  return Math.round((note-Math.min(0.9,Math.abs(val-th[i].v)/span))*10)/10;
}

/* ---------- Namenslisten einlesen ---------- */
const GENDER_OF=(v)=>{const t=String(v||"").trim().toLowerCase();
  if(/^(w|f|weiblich|female|m[äa]dchen)$/.test(t)) return "w";
  if(/^(m|j|männlich|maennlich|male|junge)$/.test(t)) return "m";
  return "x";};
function parseNameList(text){
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  if(!lines.length) return [];
  const delim=[";","\t",","].map(d=>({d,n:lines[0].split(d).length})).sort((a,b)=>b.n-a.n)[0];
  const useCols=delim.n>1;
  let map={last:0,first:1,gender:2}, start=0;
  if(useCols){
    const head=lines[0].split(delim.d).map(x=>x.trim().toLowerCase());
    const find=(...keys)=>head.findIndex(h=>keys.some(k=>h.includes(k)));
    const iL=find("nachname","familienname","zuname"), iF=find("vorname","rufname"), iG=find("geschlecht","gender","sex");
    if(iL>=0||iF>=0){ map={last:iL>=0?iL:0,first:iF>=0?iF:1,gender:iG}; start=1; }
  }
  const out=[];
  for(let i=start;i<lines.length;i++){
    const line=lines[i].trim(); if(!line) continue;
    let last="",first="",gender="x";
    if(useCols){
      const c=line.split(delim.d).map(x=>x.trim().replace(/^"|"$/g,""));
      last=c[map.last]||""; first=map.first>=0?(c[map.first]||""):"";
      gender=map.gender>=0?GENDER_OF(c[map.gender]):"x";
      if(!first&&last.includes(",")){const p=last.split(","); last=p[0].trim(); first=(p[1]||"").trim();}
      else if(!first&&last.includes(" ")){const p=last.split(/\s+/); first=p.slice(0,-1).join(" "); last=p[p.length-1];}
    } else {
      const gm=line.match(/\((m|w|d|x)\)\s*$/i);
      gender=gm?GENDER_OF(gm[1]):"x";
      const core=line.replace(/\((m|w|d|x)\)\s*$/i,"").trim();
      if(core.includes(",")){const p=core.split(","); last=p[0].trim(); first=(p[1]||"").trim();}
      else {const p=core.split(/\s+/); first=p.slice(0,-1).join(" "); last=p[p.length-1];}
    }
    if(!last&&!first) continue;
    if(/^(nachname|name|vorname)$/i.test(last)) continue;
    out.push(mkStudent(last,first,gender));
  }
  return out;
}

/* Migration älterer Sicherungen */
function migrate(s){
  if(!s||!s.classes) return null;
  const classes=s.classes.map(c=>{
    const cl={...c};
    if(!cl.terms){
      const t={id:uid(),label:"1. Halbjahr",sports:cl.sports||[],lessons:cl.lessons||[]};
      cl.terms=[t]; cl.activeTerm=t.id; delete cl.sports; delete cl.lessons;
    }
    if(!cl.activeTerm) cl.activeTerm=cl.terms[0].id;
    cl.terms=cl.terms.map(t=>({...t,sports:(t.sports||[]).map(sp=>({drop:0,...sp}))}));
    cl.students=(cl.students||[]).map(st=>{
      const s2={...st,g:st.g||{}};
      if(!s2.t){ s2.t={}; s2.t[cl.activeTerm]={final:st.final||"",comment:st.comment||"",
        absU:st.absU||0,absE:st.absE||0,forgot:st.forgot||0}; }
      delete s2.final; delete s2.comment; delete s2.absU; delete s2.absE; delete s2.forgot;
      return s2;
    });
    return cl;
  });
  return {...freshState(),...s,classes,features:{...DEFAULT_FEATURES,...(s.features||{})}};
}

/* ---------- Berechnung ---------- */
const partEntry=(st,sportId,partId)=>((st.g&&st.g[sportId]||{})[partId]||{});
const tof=(st,tid)=>((st.t||{})[tid]||{final:"",comment:"",absU:0,absE:0,forgot:0});
const sportGrade=(st,sp)=>{
  const vals=sp.parts.map(p=>({g:noteOf(partEntry(st,sp.id,p.id).n),w:Number(p.weight)||0}))
                     .filter(x=>x.g!=null&&x.w>0);
  const drop=Number(sp.drop)||0;
  let use=vals;
  if(drop>0&&vals.length-drop>=1) use=[...vals].sort((a,b)=>a.g-b.g).slice(0,vals.length-drop);
  return wMean(use.map(x=>[x.g,x.w]));
};
const calcGrade=(st,term)=>wMean(term.sports.map(s=>[sportGrade(st,s),Number(s.weight)||0]));
const totalGrade=(st,term)=>{const o=noteOf(tof(st,term.id).final); return o!=null?o:calcGrade(st,term);};
const sortStudents=(list,mode,term)=>{
  const a=[...list], byName=(x,y)=>(x.last+" "+x.first).localeCompare(y.last+" "+y.first,"de");
  if(mode==="gender") a.sort((x,y)=>(x.gender||"x").localeCompare(y.gender||"x")||byName(x,y));
  else if(mode==="note"&&term) a.sort((x,y)=>{const gx=totalGrade(x,term),gy=totalGrade(y,term);
    if(gx==null&&gy==null) return byName(x,y); if(gx==null) return 1; if(gy==null) return -1;
    return (gx-gy)||byName(x,y);});
  else a.sort(byName);
  return a;
};

const attCount=(term,stId,code)=>(term.lessons||[]).filter(l=>(l.marks||{})[stId]===code).length;
const dispName=(st,anon)=>anon?((st.last||"?").slice(0,1).toUpperCase()+". "+(st.first||"").slice(0,2)):(st.last+", "+st.first);
const progress=(students,term)=>{
  let done=0,total=0;
  students.forEach(st=>term.sports.forEach(sp=>sp.parts.forEach(p=>{
    total++; if(noteOf(partEntry(st,sp.id,p.id).n)!=null) done++;})));
  return {done,total,pct:total?done/total:0};
};
const sportProgress=(students,sp)=>{
  let done=0,total=0;
  students.forEach(st=>sp.parts.forEach(p=>{total++; if(noteOf(partEntry(st,sp.id,p.id).n)!=null) done++;}));
  return {done,total,pct:total?done/total:0};
};
function allTodos(state){
  const out=[];
  state.classes.forEach(c=>c.terms.forEach(t=>t.sports.forEach(sp=>sp.parts.forEach(p=>
    c.students.forEach(st=>{
      const e=partEntry(st,sp.id,p.id);
      if(e.todo) out.push({cls:c,term:t,sport:sp,part:p,st,date:e.todoDate||"",done:noteOf(e.n)!=null});
    })))));
  return out;
}

        const m=migrate(d); if(!m) throw 0;
        up({pending:m,pendingPick:m.classes.map(c=>c.id),screen:"import"});
      }catch(e){ say("Datei konnte nicht gelesen werden – falsches Passwort oder falsches Format."); }
    };
    r.readAsText(file);
  };
  const exportCsv=()=>{
    const head=["Nachname","Vorname","Geschlecht",...term.sports.map(s=>s.name),"Gesamtnote","festgesetzt","unentsch.","entsch.","vergessen"];
    const lines=[head.join(";")];
    sortStudents(cls.students,state.sort,term).forEach(st=>{
      const d=tof(st,term.id);
      lines.push([st.last,st.first,st.gender,...term.sports.map(s=>fmtNote(sportGrade(st,s),1)),
        fmtNote(totalGrade(st,term),1),d.final?"ja":"",
        Number(d.absU||0)+attCount(term,st.id,"u"),Number(d.absE||0)+attCount(term,st.id,"e"),
        Number(d.forgot||0)+attCount(term,st.id,"v")].join(";"));
    });
    const blob=new Blob(["\ufeff"+lines.join("\n")],{type:"text/csv;charset=utf-8"});
    const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
    a.download=cls.name+"-"+term.label+".csv"; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),400);
  };

  const snack = undo
    ? <div className="snack"><span>{undo.label}</span><button onClick={doUndo}>↩ Rückgängig</button></div>
    : toast ? <div className="snack"><span>{toast}</span></div> : null;

  /* ================= INFO ================= */
  if(state.screen==="about") return <About up={up}/>;

  /* ================= EINSTELLUNGEN ================= */
  if(state.screen==="settings"){
    const setF=(k,v)=>up({features:{...state.features,[k]:v}});
    const setPin=async()=>{
      if(state.pinHash){ if(confirm("PIN entfernen?")) up({pinHash:null}); return; }
      const p=prompt("Neue PIN (mindestens 4 Zeichen):"); if(!p||p.length<4) return say("PIN zu kurz.");
      if(p!==prompt("PIN wiederholen:")) return say("PINs stimmen nicht überein.");
      up({pinHash:await sha256(p)}); say("PIN gesetzt.");
    };
    const GROUPS=[
      ["Erfassung",[
        ["measures","Messwerte & Bewertungstabellen","Weiten und Zeiten eintragen, die Note kommt aus der Tabelle."],
        ["stopwatch","Stoppuhr","Zeiten beim Zieleinlauf direkt übernehmen."],
        ["attendance","Anwesenheit je Stunde","Stundenliste mit Datum, Fehlzeiten werden gezählt."],
        ["todo","Nachholliste","Offene Leistungen markieren und über alle Klassen hinweg sehen."],
        ["log","Notenlog","Hält fest, wann eine Note gesetzt oder geändert wurde. Erzeugt zusätzliche personenbezogene Daten."],
      ]],
      ["Berechnung & Auswertung",[
        ["drop","Streichnote","Je Sportart die schlechteste Teilnote (oder zwei) aus der Wertung nehmen."],
        ["terms","Halbjahre","Mehrere Zeiträume je Klasse mit eigenen Sportarten und Stunden."],
        ["compare","Halbjahresvergleich","Gegenüberstellung der Noten aus zwei Zeiträumen."],
        ["spiegel","Notenspiegel","Balkendiagramm der Notenverteilung."],
        ["points","Punkte der Oberstufe","Zeigt zusätzlich 15–0 Punkte."],
      ]],
      ["Texte",[
        ["notes","Notizen zu Personen","Freitextfeld im Profil."],
        ["comments","Bemerkungs-Bausteine","Textbausteine für Zeugnisbemerkungen."],
        ["teams","Gruppen losen","Zufällige Mannschaften aus der Klassenliste."],
      ]],
      ["Ansicht",[
        ["chips","Noten als Chips","Note mit Balkenanzeige statt nur farbiger Zahl."],
        ["safeColors","Farbenblind-freundlich","Orange-Blau statt Rot-Grün als Notenfarben."],
        ["hall","Hallenmodus","Größere Zeilen, Felder und Tasten."],
        ["wide","Breite Tabellenansicht","Nutzt die volle Breite von Tablet und Rechner."],
        ["webfonts","Web-Schriften von Google laden","Aus: nur Schriften des Geräts, kein externer Abruf."],
      ]],
      ["Daten",[
        ["backupReminder","Sicherungserinnerung","Meldet sich, wenn die letzte Sicherung länger als eine Woche her ist."],
      ]],
    ];
    return (
    <div className="wrap" style={{paddingTop:14}}>
      <button className="btn-quiet" style={{border:"none",paddingLeft:0}} onClick={()=>up({screen:"home"})}><Ic n="back" size={14}/> Zurück</button>
      <h1 className="brand" style={{fontSize:26,margin:"6px 0 6px"}}>Einstellungen</h1>
      <div className="hint" style={{marginBottom:12}}>
        Die App startet bewusst schlank: Notenspiegel, Bemerkungs-Bausteine, Streichnote und das Notenlog sind zu Beginn aus.
        Schalte hier zu, was du wirklich brauchst – jederzeit und ohne dass Daten verloren gehen.
      </div>

      {GROUPS.map(([title,items])=>(
        <div className="card" key={title}>
          <h2 className="sec"><Ic n="toggle" size={14}/> {title}</h2>
          {items.map(([k,name,desc],i)=>(
            <div key={k} className="row" style={{justifyContent:"space-between",padding:"8px 0",borderTop:i?"1px solid var(--line)":"none"}}>
              <div style={{flex:"1 1 200px"}}><strong>{name}</strong><div className="hint">{desc}</div></div>
              <label className="switch"><input type="checkbox" checked={!!f[k]} onChange={e=>setF(k,e.target.checked)}/><span className="slider"></span></label>
            </div>))}
          {title==="Ansicht"&&(
            <div className="row" style={{justifyContent:"space-between",padding:"8px 0",borderTop:"1px solid var(--line)"}}>
              <div style={{flex:"1 1 200px"}}><strong><Ic n="moon" size={15}/> Dunkles Design</strong></div>
              <label className="switch"><input type="checkbox" checked={state.dark} onChange={e=>up({dark:e.target.checked})}/><span className="slider"></span></label>
            </div>)}
        </div>))}

      <div className="card">
        <h2 className="sec"><Ic n="shield" size={14}/> Datenschutz & Sicherheit</h2>
        <div className="row" style={{justifyContent:"space-between",padding:"8px 0"}}>
          <div style={{flex:"1 1 200px"}}><strong>PIN beim Start</strong>
            <div className="hint">{state.pinHash?"PIN ist aktiv.":"Schützt die Liste, wenn jemand anders das Gerät in die Hand nimmt."}</div></div>
          <button className="btn-ghost" onClick={setPin}><Ic n="lock" size={14}/> {state.pinHash?"Ändern/Entfernen":"PIN setzen"}</button>
        </div>
        <div className="row" style={{justifyContent:"space-between",padding:"8px 0",borderTop:"1px solid var(--line)"}}>
          <div style={{flex:"1 1 200px"}}><strong>Namen abkürzen</strong>
            <div className="hint">Zeigt „M., Li“ statt des vollen Namens.</div></div>
          <label className="switch"><input type="checkbox" checked={state.anon} onChange={e=>up({anon:e.target.checked})}/><span className="slider"></span></label>
        </div>
        <div className="warnbox" style={{marginTop:10}}>
          <strong>Keine Gesundheitsdaten eintragen.</strong> Diagnosen, Atteste oder Angaben zu Krankheiten gehören nicht in eine App auf einem privaten Gerät.
          Neutral notieren: „nimmt bis 12.04. nicht aktiv teil, Nachweis liegt der Schule vor“.
        </div>
      </div>

      <div className="card">
        <h2 className="sec">Angaben für den Ausdruck</h2>
        <label className="lbl">Lehrkraft</label>
        <input className="inp" style={{margin:"5px 0 12px"}} value={state.teacher} onChange={e=>up({teacher:e.target.value})}/>
        <label className="lbl">Schule</label>
        <input className="inp" style={{marginTop:5}} value={state.school} onChange={e=>up({school:e.target.value})}/>
      </div>

      {f.comments&&<CommentSettings state={state} up={up}/>}

      <div className="card">
        <h2 className="sec"><Ic n="download" size={14}/> Daten</h2>
        <div className="row">
          <button className="btn-ghost" onClick={()=>doExport(true)}><Ic n="lock" size={14}/> Verschlüsselt sichern</button>
          <button className="btn-quiet" onClick={()=>doExport(false)}>Unverschlüsselt sichern</button>
          <button className="btn-ghost" onClick={()=>fileRef.current.click()}><Ic n="upload" size={14}/> Sicherung laden</button>
          <input ref={fileRef} type="file" accept=".json" style={{display:"none"}}
            onChange={e=>{if(e.target.files[0])doImport(e.target.files[0]); e.target.value="";}}/>
          <button className="btn-quiet" onClick={exportCsv}>CSV dieses Halbjahres</button>
          <button className="btn-quiet" onClick={()=>window.print()}><Ic n="printer" size={14}/> Drucken</button>
        </div>
        <div className="hint" style={{marginTop:8}}>
          Letzte Sicherung: {state.lastBackup?deDate(state.lastBackup)+" ("+daysSince(state.lastBackup)+" Tage her)":"noch keine"}.
          Sicherungen mit Schülerdaten gehören verschlüsselt – auch auf dem USB-Stick.
        </div>
        <div style={{borderTop:"1px solid var(--line)",marginTop:12,paddingTop:12}}>
          <button className="btn-danger" style={{width:"100%"}} onClick={()=>{
            if(!confirm("Alle Klassen, Noten und Notizen unwiderruflich löschen?"))return;
            const fresh=freshState(); setState(fresh); store.set("sportnoten:data",fresh); say("Alle Daten gelöscht.");}}>
            <Ic n="trash" size={14}/> Schuljahresende: alle Daten löschen</button>
        </div>
      </div>
      <div className="card"><div className="hint">{APP_NAME} – {APP_SUB} · Version {APP_VER} · {DEVELOPER}</div></div>
      {snack}
    </div>);
  }

  /* ================= SICHERUNG ÜBERNEHMEN ================= */
  if(state.screen==="import"&&state.pending){
    const pend=state.pending;
    const picked=state.pendingPick||[];
    const toggle=(id)=>up({pendingPick:picked.includes(id)?picked.filter(x=>x!==id):[...picked,id]});
    const mergeSelected=()=>{
      const add=pend.classes.filter(c=>picked.includes(c.id)).map(c=>{
        const clash=state.classes.some(x=>x.id===c.id);
        return clash?{...c,id:uid(),name:c.name+" (importiert)"}:c;
      });
      const names=new Set(state.tables.map(t=>t.name.toLowerCase()));
      const newTables=(pend.tables||[]).filter(t=>!names.has(t.name.toLowerCase())).map(t=>({...t,id:uid()}));
      up({classes:[...state.classes,...add],tables:[...state.tables,...newTables],
        selClass:add.length?add[0].id:state.selClass,pending:null,pendingPick:null,screen:"home",
        selSport:null,selStudent:null});
      say(add.length+" Klasse(n) hinzugefügt"+(newTables.length?", "+newTables.length+" Tabelle(n) ergänzt":"")+".");
    };
    return (
      <div className="wrap" style={{paddingTop:14}}>
        <button className="btn-quiet" style={{border:"none",paddingLeft:0}}
          onClick={()=>up({pending:null,pendingPick:null,screen:"settings"})}><Ic n="back" size={14}/> Abbrechen</button>
        <h1 className="brand" style={{fontSize:26,margin:"6px 0 4px"}}>Sicherung übernehmen</h1>
        <div className="hint" style={{marginBottom:12}}>
          Die Datei enthält {pend.classes.length} Klasse(n) und {(pend.tables||[]).length} Bewertungstabelle(n).
          Du kannst alles ersetzen oder nur einzelne Klassen zu deinem Bestand hinzufügen – das ist der Weg, wenn du zwischen Tablet und Rechner abgleichst.
        </div>
        <div className="card">
          <h2 className="sec">Klassen in der Datei</h2>
          {pend.classes.map(c=>{
            const on=picked.includes(c.id);
            const known=state.classes.some(x=>x.id===c.id);
            return (
            <div key={c.id} className="row" style={{justifyContent:"space-between",borderTop:"1px solid var(--line)",padding:"9px 0"}}>
              <label className="row" style={{gap:8,flex:1,cursor:"pointer"}}>
                <input type="checkbox" checked={on} onChange={()=>toggle(c.id)}/>
                <span>
                  <strong style={{fontSize:15}}>{c.name}</strong>
                  <div className="hint">{c.students.length} Personen · {c.terms.length} Zeitraum/Zeiträume · Jg. {c.jg}</div>
                </span>
              </label>
              {known&&<span className="pill" style={{background:"var(--warn-soft)",color:"var(--warn)"}}>gibt es hier schon – wird als Kopie angelegt</span>}
            </div>);})}
        </div>
        <div className="card">
          <div className="row">
            <button className="btn" onClick={mergeSelected} disabled={picked.length===0}>
              <Ic n="upload" size={14}/> {picked.length} Klasse(n) hinzufügen</button>
            <button className="btn-quiet" onClick={()=>{
              if(!confirm("Alle vorhandenen Daten durch die Sicherung ersetzen?"))return;
              setState({...pend,pending:null,pendingPick:null,screen:"home"}); say("Sicherung vollständig geladen.");}}>
              Alles ersetzen</button>
            <button className="btn-quiet" onClick={()=>up({pending:null,pendingPick:null,screen:"settings"})}>Abbrechen</button>
          </div>
          <div className="hint" style={{marginTop:8}}>
            Beim Hinzufügen bleiben deine jetzigen Klassen unverändert. Namen und Noten werden nicht zusammengeführt, sondern als eigene Klasse abgelegt – so geht nichts stillschweigend verloren.
          </div>
        </div>
        {snack}
      </div>);
  }

  /* ================= NACHHOLLISTE ================= */
  if(state.screen==="todo"&&f.todo){
    const items=allTodos(state);
    const open=items.filter(i=>!i.done), done=items.filter(i=>i.done);
    return (
      <div className="wrap" style={{paddingTop:14}}>
        <button className="btn-quiet" style={{border:"none",paddingLeft:0}} onClick={()=>up({screen:"home"})}><Ic n="back" size={14}/> Zurück</button>
        <h1 className="brand" style={{fontSize:26,margin:"6px 0 4px"}}>Nachholliste</h1>
        <div className="hint" style={{marginBottom:12}}>Alle als „nachzuholen“ markierten Leistungen – über alle Klassen und Halbjahre hinweg.</div>
        <div className="card">
          <h2 className="sec"><Ic n="flag" size={14}/> Offen ({open.length})</h2>
          {open.length===0&&<div className="hint">Nichts offen.</div>}
          {open.map((i,k)=>(
            <div key={k} className="row" style={{justifyContent:"space-between",borderTop:k?"1px solid var(--line)":"none",padding:"8px 0"}}>
              <div>
                <strong style={{fontSize:15}}>{dispName(i.st,state.anon)}</strong>
                <div className="hint">{i.cls.name} · {i.term.label} · {i.sport.name} → {i.part.name}</div>
              </div>
              <div className="row">
                {i.date&&<span className="pill">Termin {deDate(i.date)}</span>}
                <button className="btn-quiet" onClick={()=>up({selClass:i.cls.id,screen:"sport",selSport:i.sport.id,selStudent:null})}>öffnen</button>
              </div>
            </div>))}
        </div>
        {done.length>0&&(
          <div className="card">
            <h2 className="sec">Inzwischen benotet ({done.length})</h2>
            {done.map((i,k)=>(
              <div key={k} className="row" style={{justifyContent:"space-between",borderTop:k?"1px solid var(--line)":"none",padding:"6px 0"}}>
                <span className="hint">{dispName(i.st,state.anon)} · {i.cls.name} · {i.sport.name} → {i.part.name}</span>
                <NoteChip n={noteOf(partEntry(i.st,i.sport.id,i.part.id).n)} chips={f.chips}/>
              </div>))}
            <div className="hint" style={{marginTop:8}}>Markierungen kannst du in der Erfassung mit dem Fähnchen wieder entfernen.</div>
          </div>)}
        {snack}
      </div>);
  }

  /* ================= HALBJAHRESVERGLEICH ================= */
  if(state.screen==="compare"&&f.compare){
    const list=sortStudents(cls.students,state.sort,term);
    return (
      <div className="wrap" style={{paddingTop:14}}>
        <button className="btn-quiet" style={{border:"none",paddingLeft:0}} onClick={()=>up({screen:"home"})}><Ic n="back" size={14}/> {cls.name}</button>
        <h1 className="brand" style={{fontSize:26,margin:"6px 0 4px"}}>Halbjahresvergleich</h1>
        <div className="hint" style={{marginBottom:12}}>Gesamtnoten der Klasse {cls.name} in allen angelegten Zeiträumen. Ein Pfeil zeigt die Entwicklung vom ersten zum letzten Zeitraum.</div>
        <div className="card">
          <div className="row" style={{marginBottom:10}}>
            {cls.terms.map(t=>(
              <span key={t.id} className="pill" style={{background:"var(--accent-soft)",color:"var(--accent)"}}>
                {t.label} · Ø {fmtNote(mean(cls.students.map(st=>totalGrade(st,t))),2)}</span>))}
          </div>
          <div className="scroll"><table className="grid">
            <thead><tr><th className="l stick">Name</th>{cls.terms.map(t=><th key={t.id}>{t.label}</th>)}<th>Entwicklung</th></tr></thead>
            <tbody>{list.map(st=>{
              const vals=cls.terms.map(t=>totalGrade(st,t));
              const first=vals.find(v=>v!=null), last=[...vals].reverse().find(v=>v!=null);
              const d=(first!=null&&last!=null&&vals.filter(v=>v!=null).length>1)?first-last:null;
              return (
              <tr key={st.id}>
                <td className="l stick">{dispName(st,state.anon)}</td>
                {vals.map((v,i)=><td key={i}><NoteChip n={v} chips={f.chips}/></td>)}
                <td style={{fontWeight:700,color:d==null?"var(--faint)":d>0.05?"var(--green)":d<-0.05?"var(--red)":"var(--sub)"}}>
                  {d==null?"–":d>0.05?"▲ "+fmtNote(Math.abs(d),1):d<-0.05?"▼ "+fmtNote(Math.abs(d),1):"gleich"}
                </td>
              </tr>);})}</tbody>
          </table></div>
          <div className="hint" style={{marginTop:8}}>▲ bedeutet Verbesserung (kleinere Note), ▼ Verschlechterung.</div>
        </div>
        {snack}
      </div>);
  }

  /* ================= BEWERTUNGSTABELLEN ================= */
  if(state.screen==="tables"&&f.measures){
    const tab=state.tables.find(t=>t.id===state.selTable);
    const upTab=(p)=>up({tables:state.tables.map(t=>t.id===tab.id?{...t,...p}:t)});
    const importCsv=(text)=>{
      const rows=[];
      text.split(/\r?\n/).forEach(line=>{
        const c=line.split(/[;\t,]/).map(x=>x.trim());
        if(c.length<8||!/^\d+$/.test(c[0])) return;
        rows.push({id:uid(),jg:c[0],gender:GENDER_OF(c[1]),vals:{1:c[2],2:c[3],3:c[4],4:c[5],5:c[6],6:c[7]}});
      });
      if(!rows.length) return say("Keine gültigen Zeilen. Format: Jahrgang;m/w;Note1;…;Note6");
      upTab({rows:[...tab.rows,...rows]}); say(rows.length+" Zeilen übernommen.");
    };
    if(tab) return (
      <div className="wrap" style={{paddingTop:14}}>
        <button className="btn-quiet" style={{border:"none",paddingLeft:0}} onClick={()=>up({selTable:null})}><Ic n="back" size={14}/> Alle Tabellen</button>
        <div className="card">
          <div className="row">
            <input className="inp" style={{flex:"2 1 200px",fontWeight:700}} value={tab.name} onChange={e=>upTab({name:e.target.value})}/>
            <select className="inp" style={{flex:"1 1 130px"}} value={tab.unit} onChange={e=>upTab({unit:e.target.value})}>
              {UNITS.map(([v,l])=><option key={v} value={v}>{l}</option>)}</select>
            <select className="inp" style={{flex:"1 1 160px"}} value={tab.better} onChange={e=>upTab({better:e.target.value})}>
              <option value="high">Mehr ist besser</option><option value="low">Weniger ist besser (Zeit)</option></select>
            <label className="row" style={{gap:6}}><input type="checkbox" checked={!!tab.interpolate}
              onChange={e=>upTab({interpolate:e.target.checked})}/><span className="hint">Zwischennoten</span></label>
          </div>
        </div>
        <div className="card">
          <h2 className="sec">Notenschwellen</h2>
          <div className="hint" style={{marginBottom:8}}>Der Wert ist die Mindestleistung für diese Note.{tab.unit==="min"&&" Zeiten als mm:ss, z. B. 4:15."}</div>
          <div className="scroll"><table className="grid">
            <thead><tr><th className="l stick">Jg.</th><th>Geschl.</th>{GRADE_STEPS.map(g=><th key={g}>Note {g}</th>)}<th></th></tr></thead>
            <tbody>{tab.rows.map(r=>(
              <tr key={r.id}>
                <td className="stick"><input className="cell" style={{width:52}} value={r.jg}
                  onChange={e=>upTab({rows:tab.rows.map(x=>x.id===r.id?{...x,jg:e.target.value.replace(/\D/g,"")}:x)})}/></td>
                <td><select className="cell" style={{width:64}} value={r.gender}
                  onChange={e=>upTab({rows:tab.rows.map(x=>x.id===r.id?{...x,gender:e.target.value}:x)})}>
                  <option value="m">m</option><option value="w">w</option><option value="x">alle</option></select></td>
                {GRADE_STEPS.map(g=>(
                  <td key={g}><input className="cell" style={{width:66}} value={r.vals[g]??""}
                    onChange={e=>upTab({rows:tab.rows.map(x=>x.id===r.id?{...x,vals:{...x.vals,[g]:e.target.value}}:x)})}/></td>))}
                <td><button className="xbtn" onClick={()=>upTab({rows:tab.rows.filter(x=>x.id!==r.id)})}>✕</button></td>
              </tr>))}</tbody>
          </table></div>
          <button className="btn-ghost" style={{marginTop:10}}
            onClick={()=>upTab({rows:[...tab.rows,{id:uid(),jg:cls.jg,gender:"m",vals:{}}]})}><Ic n="plus" size={14}/> Zeile</button>
        </div>
        <div className="card">
          <h2 className="sec">Vorlage hochladen</h2>
          <div className="hint">CSV oder eingefügter Text, je Zeile: <code>7;m;42;36;30;24;18;12</code></div>
          <div className="row" style={{marginTop:8}}>
            <button className="btn-ghost" onClick={()=>tabFileRef.current.click()}><Ic n="upload" size={14}/> CSV wählen</button>
            <input ref={tabFileRef} type="file" accept=".csv,.txt" style={{display:"none"}}
              onChange={e=>{const file=e.target.files[0]; if(file){const r=new FileReader(); r.onload=()=>importCsv(String(r.result)); r.readAsText(file);} e.target.value="";}}/>
          </div>
          <PasteBox onPaste={importCsv}/>
        </div>
        <button className="btn-danger" style={{width:"100%"}} onClick={()=>{
          if(!confirm("Tabelle löschen?"))return; up({tables:state.tables.filter(t=>t.id!==tab.id),selTable:null});}}>
          <Ic n="trash" size={14}/> Tabelle löschen</button>
        {snack}
      </div>);
    return (
      <div className="wrap" style={{paddingTop:14}}>
        <button className="btn-quiet" style={{border:"none",paddingLeft:0}} onClick={()=>up({screen:"home"})}><Ic n="back" size={14}/> Zurück</button>
        <h1 className="brand" style={{fontSize:26,margin:"6px 0 4px"}}>Bewertungstabellen</h1>
        <div className="hint" style={{marginBottom:12}}>Die mitgelieferten Werte sind Beispielwerte und müssen an die Vorgaben deines Bundeslands angepasst werden.</div>
        {state.tables.map(t=>(
          <button key={t.id} className="card row" style={{width:"100%",textAlign:"left",border:"none",cursor:"pointer",justifyContent:"space-between"}}
            onClick={()=>up({selTable:t.id})}>
            <span><strong style={{fontSize:16}}>{t.name}</strong>
              <div className="hint">{t.rows.length} Zeilen · {(UNITS.find(u=>u[0]===t.unit)||["",""])[1]} · {t.better==="low"?"Zeit":"mehr ist besser"}</div></span>
            <span className="pill">öffnen ›</span></button>))}
        <div className="row">
          <button className="btn" onClick={()=>{const t={id:uid(),name:"Neue Tabelle",unit:"m",better:"high",interpolate:false,rows:[]};
            up({tables:[...state.tables,t],selTable:t.id});}}><Ic n="plus" size={14}/> Neue Tabelle</button>
          <button className="btn-quiet" onClick={()=>up({tables:[...state.tables,...TABLE_PRESETS()]})}>Beispieltabellen laden</button>
        </div>
        {snack}
      </div>);
  }

  /* ================= ANWESENHEIT ================= */
  if(state.screen==="attendance"&&f.attendance){
    const lessons=[...(term.lessons||[])].sort((a,b)=>b.date.localeCompare(a.date));
    const upLesson=(id,p)=>upTerm({lessons:term.lessons.map(l=>l.id===id?{...l,...p}:l)});
    return (
      <div className="wrap" style={{paddingTop:14}}>
        <button className="btn-quiet" style={{border:"none",paddingLeft:0}} onClick={()=>up({screen:"home"})}><Ic n="back" size={14}/> {cls.name}</button>
        <h1 className="brand" style={{fontSize:24,margin:"6px 0 10px"}}>Anwesenheit · {term.label}</h1>
        <div className="card">
          <div className="row">
            <button className="btn" onClick={()=>upTerm({lessons:[...(term.lessons||[]),{id:uid(),date:today(),topic:"",marks:{}}]})}>
              <Ic n="plus" size={14}/> Stunde für heute</button>
            <span className="hint">{(term.lessons||[]).length} erfasste Stunden</span>
          </div>
        </div>
        {lessons.map(l=>(
          <div key={l.id} className="card">
            <div className="row" style={{justifyContent:"space-between"}}>
              <div className="row">
                <input className="inp" type="date" style={{width:165}} value={l.date} onChange={e=>upLesson(l.id,{date:e.target.value})}/>
                <input className="inp" style={{flex:"1 1 160px"}} placeholder="Thema der Stunde" value={l.topic} onChange={e=>upLesson(l.id,{topic:e.target.value})}/>
              </div>
              <div className="row">
                <button className="btn-quiet" onClick={()=>{const m={}; cls.students.forEach(s=>m[s.id]="p"); upLesson(l.id,{marks:m});}}>Alle anwesend</button>
                <button className="xbtn" onClick={()=>remove("Stunde vom "+deDate(l.date)+" gelöscht",
                  ()=>upTerm({lessons:term.lessons.filter(x=>x.id!==l.id)}))}>✕</button>
              </div>
            </div>
            <div style={{marginTop:10}}>
              {sortStudents(cls.students,state.sort,term).map(st=>{
                const v=(l.marks||{})[st.id];
                return (
                <div key={st.id} className="row" style={{justifyContent:"space-between",borderTop:"1px solid var(--line)",padding:"5px 0"}}>
                  <span style={{fontSize:14,fontWeight:600}}>{dispName(st,state.anon)}</span>
                  <span className="row" style={{gap:4}}>
                    {ATT.map(([code,label,bg,col])=>(
                      <button key={code} className="att" title={label}
                        onClick={()=>upLesson(l.id,{marks:{...(l.marks||{}),[st.id]:v===code?undefined:code}})}
                        style={{background:v===code?bg:"var(--card)",color:v===code?col:"var(--faint)",
                          border:"1.5px solid "+(v===code?col:"var(--border)")}}>{code.toUpperCase()}</button>))}
                  </span>
                </div>);})}
            </div>
            <div className="hint" style={{marginTop:8}}>P anwesend · E entschuldigt · U unentschuldigt · V Sportzeug vergessen · Z verspätet</div>
          </div>))}
        {lessons.length===0&&<div className="card hint">Noch keine Stunde erfasst.</div>}
        {snack}
      </div>);
  }

  /* ================= SCHÜLERPROFIL ================= */
  const stu=cls.students.find(s=>s.id===state.selStudent);
  if(state.screen==="student"&&stu){
    const d=tof(stu,term.id);
    const tot=totalGrade(stu,term);
    const sums={u:Number(d.absU||0)+attCount(term,stu.id,"u"),e:Number(d.absE||0)+attCount(term,stu.id,"e"),v:Number(d.forgot||0)+attCount(term,stu.id,"v")};
    return (
      <div className="wrap" style={{paddingTop:14}}>
        <button className="btn-quiet" style={{border:"none",paddingLeft:0}} onClick={()=>up({screen:"home",selStudent:null})}><Ic n="back" size={14}/> {cls.name}</button>
        <div className="card" style={{background:"linear-gradient(135deg,var(--hero1),var(--hero2))",color:"#fff"}}>
          <div className="row" style={{justifyContent:"space-between"}}>
            <div>
              <div className="brand" style={{fontSize:22,color:"#fff"}}>{dispName(stu,state.anon)}</div>
              <div style={{fontSize:13,color:"var(--hero-ink)"}}>{cls.name} · Jg. {cls.jg} · {term.label} · {stu.gender==="m"?"männlich":stu.gender==="w"?"weiblich":"ohne Angabe"}</div>
            </div>
            <div style={{textAlign:"center"}}>
              <div className="brand" style={{fontSize:34,color:"#fff"}}>{fmtNote(tot,1)}</div>
              <div style={{fontSize:11,color:"var(--hero-ink)",fontWeight:700}}>Gesamtnote{f.points&&tot!=null?" · "+toPoints(tot)+" P":""}</div>
            </div>
          </div>
        </div>

        <div className="card">
          <h2 className="sec">Endnote</h2>
          <div className="row">
            <div><div className="lbl">Rechnerisch</div>
              <div className="brand" style={{fontSize:24,color:noteColor(calcGrade(stu,term))}}>{fmtNote(calcGrade(stu,term),1)}</div></div>
            <div style={{fontSize:20,color:"var(--border)"}}>→</div>
            <div><div className="lbl">Festgesetzt</div>
              <input className={"cell"+(noteBad(d.final)?" bad":"")} style={{width:86,color:noteColor(noteOf(d.final))}}
                value={d.final||""} placeholder="–" inputMode="decimal"
                onChange={e=>upT(stu.id,{final:e.target.value.replace(/[^0-9.,+\-−]/g,"")})}/>
              {noteBad(d.final)&&<div className="hint" style={{color:"var(--red)",fontWeight:700}}>Nur 1 bis 6</div>}</div>
            <div className="hint" style={{flex:"1 1 200px"}}>Der rechnerische Wert ist ein Vorschlag. Trägst du hier etwas ein, gilt diese Note überall. Feld leeren stellt den Vorschlag wieder her.</div>
          </div>
        </div>

        <div className="card">
          <h2 className="sec">Noten je Sportart</h2>
          {term.sports.map(sp=>{const g=sportGrade(stu,sp);
            return (
            <div key={sp.id} style={{borderTop:"1px solid var(--line)",padding:"9px 0"}}>
              <div className="row" style={{justifyContent:"space-between"}}>
                <strong>{sp.name} <span className="pill">Gewicht {sp.weight}</span>
                  {f.drop&&Number(sp.drop)>0&&<span className="pill" style={{marginLeft:5}}>Streichnote {sp.drop}</span>}</strong>
                <NoteChip n={g} chips={f.chips}/>
              </div>
              <div className="row" style={{marginTop:6,gap:6}}>
                {sp.parts.map(p=>{const e=partEntry(stu,sp.id,p.id);
                  return <span key={p.id} className="pill" style={{color:noteColor(parseNote(e.n))}}>
                    {p.name}: {e.n?fmtNote(parseNote(e.n),1):"–"}{p.type==="measure"&&e.v?" ("+e.v+")":""}{e.todo&&!e.n?" ⚑":""}</span>;})}
              </div>
            </div>);})}
        </div>

        <div className="card">
          <h2 className="sec"><Ic n="calendar" size={14}/> Fehlzeiten · {term.label}</h2>
          <div className="row">
            {[["absU","unentschuldigt","u"],["absE","entschuldigt","e"],["forgot","Sportzeug vergessen","v"]].map(([k,l,code])=>(
              <div key={k} style={{flex:"1 1 150px"}}>
                <div className="lbl" style={{marginBottom:4}}>{l}</div>
                <div className="row" style={{gap:6}}>
                  <input className="cell" style={{width:60}} inputMode="numeric" value={d[k]||0}
                    onChange={e=>upT(stu.id,{[k]:e.target.value.replace(/\D/g,"")})}/>
                  {f.attendance&&<span className="pill">+ {attCount(term,stu.id,code)} erfasst = <strong>{sums[code]}</strong></span>}
                </div>
              </div>))}
          </div>
        </div>

        {f.notes&&(
        <div className="card">
          <h2 className="sec"><Ic n="note" size={14}/> Notizen</h2>
          <textarea className="ta" value={stu.notes||""} placeholder="z. B. nimmt bis 12.04. nicht aktiv teil, Nachweis liegt der Schule vor"
            onChange={e=>upStudent(stu.id,{notes:e.target.value})}/>
          <div className="warnbox" style={{marginTop:8}}>Bitte keine Diagnosen oder Angaben zu Krankheiten notieren.</div>
        </div>)}

        {f.comments&&(
        <div className="card">
          <h2 className="sec"><Ic n="quote" size={14}/> Bemerkung fürs Zeugnis</h2>
          <textarea className="ta" value={d.comment||""} onChange={e=>upT(stu.id,{comment:e.target.value})}/>
          <div className="row" style={{marginTop:8,gap:6}}>
            {state.comments.map((c,i)=>(
              <button key={i} className="tab" style={{fontSize:12,fontWeight:600,whiteSpace:"normal",textAlign:"left"}}
                onClick={()=>upT(stu.id,{comment:((d.comment||"")+" "+c.replace(/\{N\}/g,stu.first||stu.last)).trim()})}>
                {c.replace(/\{N\}/g,stu.first||stu.last)}</button>))}
          </div>
          <div className="row" style={{marginTop:8}}>
            <button className="btn-quiet" onClick={()=>{navigator.clipboard&&navigator.clipboard.writeText(d.comment||""); say("Bemerkung kopiert.");}}>
              <Ic n="copy" size={14}/> Kopieren</button>
            <button className="btn-quiet" onClick={()=>upT(stu.id,{comment:""})}>Leeren</button>
          </div>
        </div>)}

        {f.log&&(()=>{
          const entries=(cls.log||[]).filter(l=>l.stId===stu.id).slice(0,40);
          return (
          <div className="card">
            <h2 className="sec"><Ic n="clock" size={14}/> Notenlog</h2>
            {entries.length===0
              ? <div className="hint">Seit dem Einschalten des Logs wurde für diese Person noch keine Note geändert.</div>
              : entries.map((l,i)=>(
                <div key={i} className="row" style={{justifyContent:"space-between",borderTop:i?"1px solid var(--line)":"none",padding:"6px 0"}}>
                  <span className="hint">{new Date(l.ts).toLocaleString("de-DE")} · {l.sport} → {l.part}</span>
                  <span style={{fontWeight:700,fontSize:14}}>
                    <span style={{color:"var(--faint)"}}>{l.from||"–"}</span> → <span style={{color:noteColor(noteOf(l.to))}}>{l.to||"–"}</span>
                  </span>
                </div>))}
            <div className="hint" style={{marginTop:8}}>
              Hält fest, wann eine Note gesetzt oder geändert wurde – hilfreich für Elterngespräche. Es werden höchstens 500 Einträge je Klasse aufbewahrt.
            </div>
            {(cls.log||[]).length>0&&
              <button className="btn-quiet" style={{marginTop:8}}
                onClick={()=>{if(confirm("Notenlog dieser Klasse löschen?")) upCls({log:[]});}}>Log dieser Klasse löschen</button>}
          </div>);})()}

        <div className="card">
          <h2 className="sec"><Ic n="shield" size={14}/> Auskunft nach Art. 15 DSGVO</h2>
          <div className="hint" style={{marginBottom:8}}>Textdatei mit allen zu dieser Person gespeicherten Daten – zur Weitergabe an die Schule.</div>
          <button className="btn-ghost" onClick={()=>{
            const L=[];
            L.push(APP_NAME+" – Auskunft über gespeicherte Daten, Stand "+new Date().toLocaleDateString("de-DE"));
            L.push("Person: "+stu.last+", "+stu.first+" · Geschlecht: "+stu.gender+" · Klasse: "+cls.name+" (Jg. "+cls.jg+")");
            cls.terms.forEach(t=>{
              const td=tof(stu,t.id);
              L.push(""); L.push("=== "+t.label+" ===");
              t.sports.forEach(sp=>{
                L.push("Sportart "+sp.name+" (Gewicht "+sp.weight+"): Note "+fmtNote(sportGrade(stu,sp),1));
                sp.parts.forEach(pt=>{const e=partEntry(stu,sp.id,pt.id);
                  L.push("   – "+pt.name+" ("+pt.weight+" %): "+(e.v?("Messwert "+e.v+", "):"")+"Note "+(e.n||"–")+(e.todo?" [nachzuholen]":""));});
              });
              L.push("Rechnerische Gesamtnote: "+fmtNote(calcGrade(stu,t),1));
              L.push("Festgesetzte Note: "+(td.final||"– keine –"));
              L.push("Fehlzeiten: unentschuldigt "+(Number(td.absU||0)+attCount(t,stu.id,"u"))
                +", entschuldigt "+(Number(td.absE||0)+attCount(t,stu.id,"e"))
                +", Sportzeug vergessen "+(Number(td.forgot||0)+attCount(t,stu.id,"v")));
              (t.lessons||[]).slice().sort((a,b)=>a.date.localeCompare(b.date)).forEach(l=>{
                const m=(l.marks||{})[stu.id]; if(m) L.push("   "+deDate(l.date)+" "+(l.topic||"")+": "+m.toUpperCase());});
              L.push("Bemerkung: "+(td.comment||"– keine –"));
            });
            L.push(""); L.push("Notizen: "+(stu.notes||"– keine –"));
            const blob=new Blob([L.join("\n")],{type:"text/plain;charset=utf-8"});
            const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
            a.download="auskunft-"+stu.last+"-"+stu.first+".txt"; a.click();
            setTimeout(()=>URL.revokeObjectURL(a.href),400);}}>
            <Ic n="download" size={14}/> Auskunft erstellen</button>
        </div>

        <button className="btn-danger" style={{width:"100%"}} onClick={()=>remove(dispName(stu,state.anon)+" gelöscht",()=>{
          upCls({students:cls.students.filter(x=>x.id!==stu.id)}); up({screen:"home",selStudent:null});})}>
          <Ic n="trash" size={14}/> Schüler/in löschen</button>
        {snack}
      </div>);
  }

  /* ================= SPORTART / ERFASSUNG ================= */
  const sport=term.sports.find(s=>s.id===state.selSport);
  if(state.screen==="sport"&&sport){
    const upSport=(p)=>upTerm({sports:term.sports.map(s=>s.id===sport.id?{...s,...p}:s)});
    const upPart=(pid,p)=>upSport({parts:sport.parts.map(x=>x.id===pid?{...x,...p}:x)});
    const list=sortStudents(cls.students,state.sort,term);
    const openOnly=!!state.onlyOpen;
    const rows=openOnly?list.filter(st=>sport.parts.some(p=>noteOf(partEntry(st,sport.id,p.id).n)==null)):list;
    const wSum=sport.parts.reduce((a,p)=>a+(Number(p.weight)||0),0);
    const measureParts=sport.parts.filter(p=>p.type==="measure");
    const pr=sportProgress(cls.students,sport);
    const onMeasure=(st,part,raw)=>{
      const tab=state.tables.find(t=>t.id===part.tableId);
      const val=parseVal(raw,tab?tab.unit:part.unit);
      const cur=partEntry(st,sport.id,part.id);
      const patch={v:raw};
      if(cur.auto!==false){
        const n=gradeFromTable(tab,val,cls.jg,st.gender);
        patch.n=n==null?"":String(n).replace(".",",");
      }
      setEntry(st.id,sport.id,part.id,patch);
    };
    return (
      <div className="wrap" style={{paddingTop:14}}>
        <button className="btn-quiet" style={{border:"none",paddingLeft:0}} onClick={()=>up({screen:"home",selSport:null})}><Ic n="back" size={14}/> {cls.name} · {term.label}</button>

        {f.stopwatch&&f.measures&&measureParts.length>0&&
          <Stopwatch parts={measureParts} students={list} anon={state.anon} tables={state.tables}
            onAssign={(st,part,secs)=>{
              const tab=state.tables.find(t=>t.id===part.tableId);
              onMeasure(st,part,fmtVal(secs,tab?tab.unit:"s"));
              say(dispName(st,state.anon)+": "+fmtVal(secs,tab?tab.unit:"s")+" übernommen");}}/>}

        <div className="card">
          <div className="row">
            <input className="inp" style={{flex:"2 1 200px",fontWeight:700}} value={sport.name} onChange={e=>upSport({name:e.target.value})}/>
            <label className="row" style={{gap:6}}><span className="lbl">Gewicht gesamt</span>
              <input className="cell" style={{width:60}} inputMode="numeric" value={sport.weight}
                onChange={e=>upSport({weight:e.target.value.replace(/\D/g,"")})}/></label>
            {f.drop&&(
              <label className="row" style={{gap:6}}><span className="lbl">Streichnoten</span>
                <select className="cell" style={{width:70}} value={sport.drop||0} onChange={e=>upSport({drop:Number(e.target.value)})}>
                  <option value={0}>keine</option><option value={1}>1</option><option value={2}>2</option></select></label>)}
            {state.classes.length>1&&(
              <select className="inp" style={{flex:"1 1 190px"}} value="" onChange={e=>{
                const cid=e.target.value; if(!cid)return;
                const copy={...sport,id:uid(),parts:sport.parts.map(p=>({...p,id:uid()}))};
                up({classes:state.classes.map(c=>{
                  if(c.id!==cid) return c;
                  const at=c.terms.find(t=>t.id===c.activeTerm)||c.terms[0];
                  return {...c,terms:c.terms.map(t=>t.id===at.id?{...t,sports:[...t.sports,copy]}:t)};})});
                say("Sportart in die andere Klasse kopiert.");}}>
                <option value="">In andere Klasse kopieren …</option>
                {state.classes.filter(c=>c.id!==cls.id).map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
              </select>)}
          </div>
          {f.drop&&Number(sport.drop)>0&&
            <div className="hint" style={{marginTop:8}}>Die {sport.drop===1?"schlechteste Teilnote":"zwei schlechtesten Teilnoten"} dieser Sportart {sport.drop===1?"wird":"werden"} nicht gewertet – sofern danach noch eine Note übrig bleibt.</div>}
        </div>

        <div className="card">
          <h2 className="sec">Teilnoten & Gewichtung</h2>
          {sport.parts.map(p=>{
            const tab=state.tables.find(t=>t.id===p.tableId);
            return (
            <div key={p.id} style={{borderTop:"1px solid var(--line)",padding:"8px 0"}}>
              <div className="row">
                <input className="inp" style={{flex:"2 1 180px"}} value={p.name} onChange={e=>upPart(p.id,{name:e.target.value})}/>
                <input className="cell" style={{width:56}} inputMode="numeric" value={p.weight}
                  onChange={e=>upPart(p.id,{weight:e.target.value.replace(/\D/g,"")})}/><span className="hint">%</span>
                {f.measures&&(
                  <select className="inp" style={{flex:"1 1 160px"}} value={p.type} onChange={e=>upPart(p.id,{type:e.target.value})}>
                    <option value="manual">Note direkt eintragen</option><option value="measure">Messung (Weite/Zeit)</option></select>)}
                {f.measures&&p.type==="measure"&&(
                  <select className="inp" style={{flex:"1 1 170px"}} value={p.tableId||""} onChange={e=>upPart(p.id,{tableId:e.target.value||null})}>
                    <option value="">– Tabelle wählen –</option>
                    {state.tables.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}</select>)}
                <button className="xbtn" onClick={()=>upSport({parts:sport.parts.filter(x=>x.id!==p.id)})}>✕</button>
              </div>
              {f.measures&&p.type==="measure"&&!tab&&<div className="hint" style={{color:"var(--warn)"}}>Ohne Tabelle wird keine Note berechnet.</div>}
            </div>);})}
          <div className="row" style={{marginTop:10}}>
            <button className="btn-ghost" onClick={()=>upSport({parts:[...sport.parts,mkPart("Neue Teilnote",10)]})}><Ic n="plus" size={14}/> Teilnote</button>
            <span className="hint" style={{color:wSum===100?"var(--sub)":"var(--warn)"}}>Summe {wSum} % – die Gewichte wirken im Verhältnis, 100 % sind nicht nötig.</span>
          </div>
        </div>

        <div className="card">
          <div className="row" style={{justifyContent:"space-between"}}>
            <h2 className="sec">Erfassung</h2>
            <span className="pill">{pr.done} von {pr.total} Teilnoten</span>
          </div>
          <SortBar state={state} up={up}/>
          <div className="row" style={{marginBottom:8}}>
            <button className={"tab"+(openOnly?" on":"")} style={{padding:"4px 11px",fontSize:13}}
              onClick={()=>up({onlyOpen:!openOnly})}>Nur offene anzeigen</button>
            {openOnly&&<span className="hint">{rows.length} von {list.length} noch unvollständig</span>}
          </div>
          <GradeGrid rows={rows} sport={sport} f={f} tables={state.tables} anon={state.anon}
            clsId={cls.id} applyCell={applyCell} toggleTodo={toggleTodo} openStudent={openStudent}/>
          <div className="hint" style={{marginTop:8}}>
            Gestrichelte Noten stammen aus der Bewertungstabelle. {f.todo&&"Mit dem Fähnchen markierst du eine Leistung als nachzuholen. "}
            Enter oder Pfeil nach unten springt in die nächste Zeile, Umschalt+Enter nach oben. Gültig sind Noten von 1 bis 6, auch als 2+ oder 3−.
          </div>
        </div>

        {f.spiegel&&<Notenspiegel values={list.map(st=>sportGrade(st,sport))} title={"Notenspiegel · "+sport.name}/>}
        {rows.length===0&&openOnly&&<div className="card hint">Alle Teilnoten dieser Sportart sind erfasst.</div>}

        <button className="btn-danger" style={{width:"100%"}} onClick={()=>remove("Sportart „"+sport.name+"“ gelöscht",()=>{
          upTerm({sports:term.sports.filter(s=>s.id!==sport.id)}); up({screen:"home",selSport:null});})}>
          <Ic n="trash" size={14}/> Sportart löschen</button>
        {snack}
      </div>);
  }

  /* ================= HOME ================= */
  const list=sortStudents(cls.students,state.sort,term);
  const pr=progress(cls.students,term);
  const todoOpen=f.todo?allTodos(state).filter(i=>!i.done).length:0;
  const backupDue=f.backupReminder&&(state.lastBackup==null||daysSince(state.lastBackup)>7)&&cls.students.length>0;
  return (
  <div className="wrap" style={{paddingTop:14}}>
    <div className="row" style={{justifyContent:"space-between",marginBottom:10}}>
      <Wordmark/>
      <div className="row" style={{gap:4}}>

/* ---------- Eingabezelle: puffert lokal, schreibt beim Verlassen ---------- */
const CellInput = React.memo(function CellInput({value,onCommit,width,color,dashed,bad,placeholder,onNav,rc,reg}){
  const [v,setV]=useState(value==null?"":value);
  const timer=useRef(null);
  const dirty=useRef(false);
  useEffect(()=>{ if(!dirty.current) setV(value==null?"":value); },[value]);
  const commit=(nv)=>{ dirty.current=false; if((nv||"")!==(value||"")) onCommit(nv); };
  const change=(e)=>{
    const nv=e.target.value.replace(/[^0-9.,:+\-−\s]/g,"");
    dirty.current=true; setV(nv);
    clearTimeout(timer.current);
    timer.current=setTimeout(()=>commit(nv),700);   /* Sicherheitsnetz, falls niemand das Feld verlässt */
  };
  return (
    <input className={"cell"+(bad?" bad":"")} inputMode="decimal" value={v} placeholder={placeholder}
      ref={reg} aria-invalid={bad?"true":"false"}
      style={{width,color:bad?undefined:color,borderStyle:dashed?"dashed":"solid"}}
      onChange={change}
      onFocus={e=>e.target.select()}
      onBlur={()=>{ clearTimeout(timer.current); commit(v); }}
      onKeyDown={e=>{ if(onNav) onNav(e,rc,()=>{ clearTimeout(timer.current); commit(v); }); }}/>
  );
});

/* ---------- Erfassungsraster mit Tastaturnavigation ---------- */
function GradeGrid({rows,sport,f,tables,anon,clsId,applyCell,toggleTodo,openStudent}){
  const refs=useRef({});
  const reg=(key)=>(el)=>{ if(el) refs.current[key]=el; else delete refs.current[key]; };
  const onNav=(e,rc,flush)=>{
    let dr=0;
    if(e.key==="Enter") dr=e.shiftKey?-1:1;
    else if(e.key==="ArrowDown") dr=1;
    else if(e.key==="ArrowUp") dr=-1;
    else return;
    e.preventDefault(); flush();
    const target=refs.current[(rc.r+dr)+"_"+rc.c];
    if(target){ target.focus(); if(target.select) target.select(); }
  };
  const bad=rows.some(st=>sport.parts.some(p=>noteBad(partEntry(st,sport.id,p.id).n)));
  return (
    <div>
      <div className="scroll"><table className="grid">
        <thead><tr><th className="l stick">Name</th>
          {sport.parts.map(p=>(
            <th key={p.id} colSpan={(f.measures&&p.type==="measure"?1:0)+(f.todo?1:0)+1}>
              {p.name}<br/><span style={{fontWeight:400}}>{p.weight} %</span></th>))}
          <th>Ø</th></tr></thead>
        <tbody>{rows.map((st,r)=>(
          <GradeRow key={st.id} st={st} sport={sport} f={f} tables={tables} anon={anon} clsId={clsId}
            applyCell={applyCell} toggleTodo={toggleTodo} openStudent={openStudent}
            r={r} reg={reg} onNav={onNav}/>))}</tbody>
      </table></div>
      {bad&&<div className="hint" style={{color:"var(--red)",fontWeight:700,marginTop:6}}>
        Rot umrandete Felder liegen außerhalb von 1 bis 6 und werden nicht mitgerechnet.</div>}
    </div>);
}

/* ---------- Note als Chip mit Balken (zweites Merkmal neben der Farbe) ---------- */
function NoteChip({n,chips=true,star}){
  if(n==null||isNaN(n)) return <span style={{color:"var(--faint)",fontWeight:700}}>–</span>;
  const c=noteColor(n);
  if(!chips) return <strong style={{color:c}}>{fmtNote(n,1)}{star?"*":""}</strong>;
  const filled=Math.max(1,Math.min(6,Math.round(7-n)));
  return (
    <span className="nchip" style={{borderColor:c,color:c}} title={"Note "+fmtNote(n,1)}>
      {fmtNote(n,1)}{star?"*":""}
      <span className="segs">{[1,2,3,4,5,6].map(i=>(
        <i key={i} style={{height:3+i*1.4,background:i<=filled?c:"var(--border)"}}/>))}</span>
    </span>);
}

/* ---------- Sperrbildschirm ---------- */
function LockScreen({hash,onOk}){
  const [pin,setPin]=useState(""), [err,setErr]=useState("");
  const check=async()=>{const h=await sha256(pin); if(h===hash) onOk(); else {setErr("PIN stimmt nicht."); setPin("");}};
  return (
    <div className="lock">
      <div className="card" style={{width:290,textAlign:"center"}}>
        <div style={{display:"flex",justifyContent:"center",marginBottom:14}}><Wordmark/></div>
        <Ic n="lock" size={22} color="var(--faint)" style={{marginBottom:8}}/>
        <input className="inp" type="password" inputMode="numeric" placeholder="PIN" value={pin} autoFocus
          onChange={e=>{setPin(e.target.value); setErr("");}} onKeyDown={e=>e.key==="Enter"&&check()}/>
        {err&&<div style={{color:"var(--red)",fontSize:13,marginTop:6,fontWeight:700}}>{err}</div>}
        <button className="btn" style={{width:"100%",marginTop:10}} onClick={check}>Entsperren</button>
      </div>
    </div>);
}

/* ---------- Stoppuhr ---------- */
function Stopwatch({parts,students,anon,tables,onAssign}){
  const [open,setOpen]=useState(false), [run,setRun]=useState(false), [ms,setMs]=useState(0);
  const [partId,setPartId]=useState(parts[0]?parts[0].id:"");
  const [done,setDone]=useState({});
  const t0=useRef(0), raf=useRef(null);
  useEffect(()=>{
    if(!run) return;
    t0.current=Date.now()-ms;
    const tick=()=>{setMs(Date.now()-t0.current); raf.current=setTimeout(tick,71);};
    tick();
    return ()=>clearTimeout(raf.current);
  },[run]);
  const part=parts.find(p=>p.id===partId)||parts[0];
  const secs=ms/1000;
  const show=()=>{const m=Math.floor(secs/60), s=secs-m*60; return m+":"+(s<10?"0":"")+s.toFixed(2).replace(".",",");};
  if(!open) return <button className="btn-quiet" style={{marginBottom:12}} onClick={()=>setOpen(true)}><Ic n="clock" size={14}/> Stoppuhr öffnen</button>;
  return (
    <div className="watchbar">
      <div className="row" style={{justifyContent:"space-between"}}>
        <div className="brand" style={{fontSize:30,color:"#fff",minWidth:130}}>{show()}</div>
        <div className="row">
          <button className="btn" onClick={()=>setRun(!run)}>{run?"Stopp":"Start"}</button>
          <button className="btn-quiet" onClick={()=>{setRun(false); setMs(0); setDone({});}}>Zurücksetzen</button>
          <button className="btn-quiet" onClick={()=>setOpen(false)}>Schließen</button>
        </div>
      </div>
      <div className="row" style={{marginTop:8}}>
        <span style={{fontSize:12,color:"var(--hero-ink)",fontWeight:700}}>Disziplin</span>
        <select className="inp" style={{flex:"1 1 180px",padding:"6px 8px"}} value={partId} onChange={e=>setPartId(e.target.value)}>
          {parts.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</select>
      </div>
      <div className="row" style={{marginTop:8,gap:5}}>
        {students.map(st=>(
          <button key={st.id} className="tab" style={{opacity:done[st.id]?0.45:1,padding:"5px 10px",fontSize:13}}
            onClick={()=>{if(!part)return; onAssign(st,part,secs); setDone(d=>({...d,[st.id]:true}));}}>
            {dispName(st,anon)}</button>))}
      </div>
      <div style={{fontSize:12,color:"var(--hero-ink)",marginTop:6}}>
        Bei Zieleinlauf auf den Namen tippen – die Zeit wird eingetragen und benotet, die Uhr läuft weiter.
      </div>
    </div>);
}

function StudentAdder({onAdd,onBulk,existing}){
  const [last,setLast]=useState(""), [first,setFirst]=useState(""), [g,setG]=useState("m");
  const [bulk,setBulk]=useState(""), [open,setOpen]=useState(false), [prev,setPrev]=useState(null);
  const fileRef=useRef(null);
  const add=()=>{if(!last.trim()&&!first.trim())return; onAdd(mkStudent(last.trim(),first.trim(),g)); setLast(""); setFirst("");};
  const preview=(text)=>{
    const arr=parseNameList(text);
    const known=new Set((existing||[]).map(x=>(x.last+"|"+x.first).toLowerCase()));
    setPrev({all:arr,neu:arr.filter(x=>!known.has((x.last+"|"+x.first).toLowerCase()))});
  };
  const commit=()=>{if(prev&&prev.neu.length) onBulk(prev.neu); setPrev(null); setBulk(""); setOpen(false);};
  return (
    <div style={{marginTop:12,borderTop:"1px solid var(--line)",paddingTop:12}}>
      <div className="row">
        <input className="inp" style={{flex:"1 1 130px"}} placeholder="Nachname" value={last}
          onChange={e=>setLast(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()}/>
        <input className="inp" style={{flex:"1 1 130px"}} placeholder="Vorname" value={first}
          onChange={e=>setFirst(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()}/>
        <select className="inp" style={{width:80}} value={g} onChange={e=>setG(e.target.value)}>
          <option value="m">m</option><option value="w">w</option><option value="x">–</option></select>
        <button className="btn" onClick={add}><Ic n="plus" size={14}/> Eintragen</button>
      </div>
      <button className="btn-quiet" style={{border:"none",paddingLeft:0,marginTop:6}} onClick={()=>{setOpen(!open); setPrev(null);}}>
        {open?"▾":"▸"} Klassenliste importieren</button>
      {open&&(<div>
        <div className="hint" style={{marginTop:4}}>
          Aus einer Datei (CSV, TXT, Tabellen-Export der Schulverwaltung) oder als eingefügter Text.
          Erkannt werden Überschriften wie <code>Nachname; Vorname; Geschlecht</code> und Zeilen wie <code>Meier, Lina (w)</code>.
        </div>
        <div className="row" style={{margin:"8px 0"}}>
          <button className="btn-ghost" onClick={()=>fileRef.current.click()}><Ic n="upload" size={14}/> Datei wählen</button>
          <input ref={fileRef} type="file" accept=".csv,.txt,.tsv" style={{display:"none"}}
            onChange={e=>{const file=e.target.files[0];
              if(file){const r=new FileReader(); r.onload=()=>preview(String(r.result)); r.readAsText(file,"utf-8");}
              e.target.value="";}}/>
          <span className="hint">Excel: „Speichern unter → CSV“</span>
        </div>
        <textarea className="ta" value={bulk} onChange={e=>{setBulk(e.target.value); setPrev(null);}}
          placeholder={"Nachname;Vorname;Geschlecht\nMeier;Lina;w\nKrause;Ben;m"}/>
        <div className="row" style={{marginTop:6}}>
          <button className="btn-quiet" onClick={()=>preview(bulk)}>Vorschau prüfen</button>
          {prev&&prev.neu.length>0&&<button className="btn" onClick={commit}>{prev.neu.length} Personen übernehmen</button>}
        </div>
        {prev&&(
          <div className="card" style={{marginTop:10,background:"var(--chip)",boxShadow:"none"}}>
            <div className="lbl" style={{marginBottom:6}}>Vorschau</div>
            {prev.all.length===0
              ? <div className="hint">Keine Namen erkannt. Prüfe Trennzeichen und Überschriften.</div>
              : (<div>
                  <div className="hint" style={{marginBottom:6}}>
                    {prev.all.length} Zeilen gelesen · {prev.neu.length} neu · {prev.all.length-prev.neu.length} bereits vorhanden (werden übersprungen)</div>
                  <div style={{maxHeight:150,overflowY:"auto"}}>
                    {prev.all.slice(0,40).map((x,i)=>(
                      <div key={i} className="row" style={{justifyContent:"space-between",padding:"2px 0",fontSize:14}}>
                        <span>{x.last}, {x.first}</span><span className="pill">{x.gender}</span></div>))}
                    {prev.all.length>40&&<div className="hint">… und {prev.all.length-40} weitere</div>}
                  </div>
                </div>)}
          </div>)}
      </div>)}
    </div>);
}

function SportAdder({onAdd,tables,measures}){
  const [open,setOpen]=useState(false);
  const build=(preset)=>{
    const parts=[];
    (preset.parts||[]).forEach(([n,w])=>parts.push(mkPart(n,w)));
    if(measures)(preset.measures||[]).forEach(([n,unit])=>{
      const tab=tables.find(t=>t.name.toLowerCase().startsWith(n.toLowerCase().slice(0,6)));
      parts.push(mkPart(n,Math.round(75/(preset.measures.length||1)),"measure",tab?tab.id:null,unit));
    });
    (preset.extra||[]).forEach(([n,w])=>parts.push(mkPart(n,w)));
    if(!parts.length) parts.push(mkPart("Mitarbeit",100));
    onAdd(mkSport(preset.name,parts)); setOpen(false);
  };
  return (
    <div style={{marginTop:12,borderTop:"1px solid var(--line)",paddingTop:12}}>
      <div className="row">
        <button className="btn" onClick={()=>setOpen(!open)}><Ic n="plus" size={14}/> Sportart aus Vorlage</button>
        <button className="btn-quiet" onClick={()=>onAdd(mkSport("Neue Sportart",[mkPart("Mitarbeit",100)]))}>Leere Sportart</button>
      </div>
      {open&&<div className="row" style={{marginTop:10,gap:6}}>
        {SPORT_PRESETS.map(p=><button key={p.name} className="tab" onClick={()=>build(p)}>{p.name}</button>)}
      </div>}
    </div>);
}

function Notenspiegel({values,title}){
  const v=values.filter(x=>x!=null).map(x=>Math.min(6,Math.max(1,Math.round(x))));
  if(!v.length) return null;
  const counts=GRADE_STEPS.map(g=>v.filter(x=>x===g).length), max=Math.max(...counts,1);
  return (
    <div className="card">
      <h2 className="sec"><Ic n="chart" size={14}/> {title}</h2>
      <div className="row" style={{alignItems:"flex-end",gap:10,height:110,flexWrap:"nowrap"}}>
        {counts.map((c,i)=>(
          <div key={i} style={{flex:1,textAlign:"center"}}>
            <div style={{fontSize:12,fontWeight:700,color:"var(--sub)"}}>{c||""}</div>
            <div style={{height:(c/max)*76+4,background:noteColor(i+1),borderRadius:"6px 6px 0 0"}}></div>
            <div style={{fontSize:12,fontWeight:700,marginTop:4}}>{i+1}</div>
          </div>))}
      </div>
      <div className="hint" style={{marginTop:6}}>Ø {fmtNote(mean(values),2)} · {v.length} Noten</div>
    </div>);
}

function PasteBox({onPaste}){
  const [v,setV]=useState("");
  return (<div style={{marginTop:8}}>
    <textarea className="ta" value={v} onChange={e=>setV(e.target.value)} placeholder={"7;m;42;36;30;24;18;12\n7;w;30;25;20;16;12;8"}/>

  </div>);
}

  ["whistle","Sportarten und Teilnoten","Für Basketball, Volleyball, Turnen, Leichtathletik, Schwimmen und weitere gibt es Vorlagen mit fertigen Teilbereichen; eigene legst du in Sekunden an. Jede Teilnote – Technik, Spielfähigkeit, Mitarbeit – bekommt eine Gewichtung in Prozent, jede Sportart ein Gewicht in der Gesamtnote. Die Gewichte wirken im Verhältnis zueinander und müssen sich nicht auf 100 addieren. Eine fertige Sportart lässt sich mit einem Klick in eine andere Klasse übernehmen."],

  ["clock","Stoppuhr mit Direktübernahme","Beim Ausdauerlauf öffnest du die Stoppuhr, wählst die Disziplin und startest einmal. Bei jedem Zieleinlauf tippst du auf den Namen: Die laufende Zeit wird eingetragen und sofort benotet, während die Uhr für die Nachfolgenden weiterläuft."],
  ["calendar","Anwesenheit je Stunde","Lege eine Stunde mit Datum und Thema an und markiere je Person anwesend, entschuldigt, unentschuldigt, Sportzeug vergessen oder verspätet. Die Summen laufen automatisch ins Profil, in die Notenliste, in den Ausdruck und in den CSV-Export."],
  ["flag","Nachholliste","Fehlt eine Leistung, markierst du sie in der Erfassung mit dem Fähnchen und hinterlegst optional einen Termin. Die Nachholliste sammelt alle Markierungen über sämtliche Klassen und Halbjahre hinweg – am Halbjahresende siehst du auf einer Seite, was noch aussteht."],
  ["chart","Noten, Endnote und Auswertung","Aus den Teilnoten entsteht die Note je Sportart, daraus die rechnerische Gesamtnote. Sie ist ein Vorschlag: Im Profil setzt du die Endnote pädagogisch fest, sie wird mit einem Sternchen gekennzeichnet. Auf Wunsch lässt sich je Sportart eine Streichnote festlegen, sodass die schlechteste Teilnote unberücksichtigt bleibt. Fortschrittsbalken zeigen, wie viele Teilnoten schon erfasst sind, der Notenspiegel die Verteilung, und der Halbjahresvergleich stellt die Zeiträume mit Entwicklungspfeil gegenüber."],

function renderPrint(state,cls,term){
  const el=document.getElementById("print"); if(!el)return;
  const list=sortStudents(cls.students,state.sort,term);
  const head=["Name",...term.sports.map(s=>s.name),"Gesamt","unents.","entsch.","vergessen"];
  const rows=list.map(st=>{
    const d=tof(st,term.id);
    const tds=[dispName(st,state.anon),...term.sports.map(s=>fmtNote(sportGrade(st,s),1)),
      "<strong>"+fmtNote(totalGrade(st,term),1)+(parseNote(d.final)!=null?"*":"")+"</strong>",
      Number(d.absU||0)+attCount(term,st.id,"u"),Number(d.absE||0)+attCount(term,st.id,"e"),
      Number(d.forgot||0)+attCount(term,st.id,"v")];
    return "<tr>"+tds.map(x=>"<td>"+x+"</td>").join("")+"</tr>";
  }).join("");
  el.innerHTML=`<div class="print-sheet">
    <h1>${APP_NAME} – Notenliste ${cls.name} · ${term.label}</h1>
    <div>${[state.teacher,state.school,"Jahrgang "+cls.jg].filter(Boolean).join(" · ")} · Stand ${new Date().toLocaleDateString("de-DE")}</div>
    <table><thead><tr>${head.map(h=>"<th>"+h+"</th>").join("")}</tr></thead><tbody>${rows}</tbody></table>
    <p style="font-size:10px;color:#666">* festgesetzte Note. Vertraulich – enthält personenbezogene Daten. Nach Gebrauch sicher aufbewahren oder vernichten.</p>
  </div>`;
}
